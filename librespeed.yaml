apiVersion: apps/v1
kind: Deployment
metadata:
  name: librespeed-deployment
spec:
  selector:
    matchLabels:
      app: librespeed
  replicas: 1
  template:
    metadata:
      labels:
        app: librespeed
    spec:
      containers:
        - name: librespeed
          image: linuxserver/librespeed:6.0.2
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: librespeed-service
spec:
  selector:
    app: librespeed
  ports:
    - protocol: TCP
      port: 80
