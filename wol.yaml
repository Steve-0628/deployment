apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wol-statefulset
spec:
  selector:
    matchLabels:
      app: wol-app
  replicas: 1
  template:
    metadata:
      labels:
        app: wol-app
    spec:
      containers:
        - name: wol
          image: ghcr.io/steve-0628/wol:latest@sha256:bad9acba504437ef70a8a22ce17edbc4d6d926d6fa56fe87e7dc275b5558f704
          ports:
            - containerPort: 3000
          env:
            - name:  BASE_DIRECTORY
              value: "/index"
          volumeMounts:
            - name: wol-nfs
              mountPath: /index
      volumes:
        - name: wol-nfs
          nfs:
            server: 172.16.1.3
            path: /mnt/data-tank/share/index
---
apiVersion: v1
kind: Service
metadata:
  name: wol-service
spec:
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: wol-app
  type: LoadBalancer
  loadBalancerIP: 172.16.10.101

