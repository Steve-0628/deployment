apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-web
spec:
  selector:
    matchLabels:
      app: immich-web
  template:
    metadata:
      labels:
        app: immich-web
    spec:
      containers:
      - name: immich-web
        image: ghcr.io/immich-app/immich-server:v2.7.5
        ports:
        - containerPort: 2283
          name: web
        resources:
          requests:
            cpu: 500m
            memory: 6Gi
        env:
          - name: TZ
            value: Asia/Tokyo
          - name: DB_HOSTNAME
            value: immich-postgres
          - name: DB_USERNAME
            value: postgres
          - name: DB_PASSWORD
            value: postgres
          - name: DB_DATABASE_NAME
            value: immich
          - name: REDIS_HOSTNAME
            value: immich-redis
          - name: IMMICH_LOG_LEVEL
            value: debug
        volumeMounts:
        - name: immich-data
          mountPath: /data
      volumes:
        - name: immich-data
          nfs:
            server: 172.16.1.3
            path: /mnt/data-tank/share/immich
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
spec:
  selector:
    matchLabels:
      app: immich-machine-learning
  template:
    metadata:
      labels:
        app: immich-machine-learning
    spec:
      containers:
      - name: immich-machine-learning-app
        image: ghcr.io/immich-app/immich-machine-learning:v2.7.5
        ports:
        - containerPort: 3003
          name: immich-ml
        resources:
          requests:
            cpu: 1500m
            memory: 3Gi
        env:
          - name: TZ
            value: Asia/Tokyo
          - name: DB_HOSTNAME
            value: immich-postgres
          - name: DB_USERNAME
            value: postgres
          - name: DB_PASSWORD
            value: postgres
          - name: DB_DATABASE_NAME
            value: immich
          - name: REDIS_HOSTNAME
            value: immich-redis
        volumeMounts:
        - name: model-cache
          mountPath: /cache
      volumes:
      - name: model-cache
        emptyDir: {}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: immich-redis-statefulset
spec:
  selector:
    matchLabels:
      app: immich-redis-app
  serviceName: immich-redis
  replicas: 1
  template:
    metadata:
      labels:
        app: immich-redis-app
    spec:
      containers:
      - name: immich-redis-app
        image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            cpu: 20m
            memory: 64Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: immich-postgres-statefulset
spec:
  selector:
    matchLabels:
      app: immich-postgres-app
  serviceName: immich-postgres
  replicas: 1
  template:
    metadata:
      labels:
        app: immich-postgres-app
    spec:
      containers:
      - name: immich-postgres-app
        image: ghcr.io/immich-app/postgres:16-vectorchord0.4.3-pgvectors0.2.0@sha256:1a078b237c1d9b420b0ee59147386b4aa60d3a07a8e6a402fc84a57e41b043a4
        ports:
        - containerPort: 5432
          name: postgres
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_DB
          value: immich
        - name: POSTGRES_INITDB_ARGS
          value: '--data-checksums'
        - name: PGDATA
          value: /var/lib/postgresql/data/database
        - name: DB_STORAGE_TYPE
          value: HDD
        volumeMounts:
        - name: immich-postgres-volume
          mountPath: /var/lib/postgresql/data
        # args:
        #   - -c
        #   - synchronous_commit=off
      securityContext:
        runAsUser: 999
        fsGroup: 999
        supplementalGroups: [0, 27]
      volumes:
      - name: immich-postgres-volume
        persistentVolumeClaim:
          claimName: immich-postgres-volume-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-postgres-volume-pvc
spec:
  resources:
    requests:
      storage: 10G
  storageClassName: nfs-client
  accessModes:
    - ReadWriteOnce
---
apiVersion: v1
kind: Service
metadata:
  name: immich-web
spec:
  selector:
    app: immich-web
  ports:
  - port: 2283
    targetPort: 2283
---
apiVersion: v1
kind: Service
metadata:
  name: immich-machine-learning
spec:
  selector:
    app: immich-machine-learning
  ports:
  - port: 3003
    targetPort: 3003
---
apiVersion: v1
kind: Service
metadata:
  name: immich-redis
spec:
  selector:
    app: immich-redis-app
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: immich-postgres
spec:
  selector:
    app: immich-postgres-app
  ports:
  - port: 5432
    targetPort: 5432
